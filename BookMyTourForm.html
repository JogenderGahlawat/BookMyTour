<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book My Tour - Login/Signup</title>
    
    <link rel="stylesheet" href="Form.css"> 
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
    <div class="flip-container">
        <div class="card" id="card">

            <div class="form-container front">
                <form id="loginForm">
                    <h1 class="form-title">Login</h1>

                    <div class="input-box">
                        <input type="email" placeholder="Email" name="email" required>
                        <i class="fas fa-envelope"></i>
                    </div>

                    <div class="input-box">
                        <input type="password" placeholder="Password" name="password" required>
                        <i class="fas fa-lock"></i>
                    </div>

                    <div class="remember-forgot-box">
                        <label class="remember-me">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button class="main-button" type="submit" name="login">Login</button>
                    <p class="message" id="loginMessage"></p>
                    
                    <div class="divider">or continue with</div>
                    
                    <div class="social-login">
                        <a href="#" class="social-btn google"><i class="fab fa-google"></i></a>
                        <a href="#" class="social-btn apple"><i class="fab fa-apple"></i></a>
                        <a href="#" class="social-btn facebook"><i class="fab fa-facebook-f"></i></a>
                    </div>

                    <p class="switch-link">
                        Don't have an account?
                        <span id="show-signup">Sign up</span>
                    </p>
                </form>
            </div>

            <div class="form-container back">
                <form id="signupForm">
                    <h1 class="form-title">Create Account</h1>

                    <div class="input-group">
                        <div class="input-box">
                            <input type="text" placeholder="First Name" name="firstName" required>
                        </div>
                        <div class="input-box">
                            <input type="text" placeholder="Last Name" name="lastName" required>
                        </div>
                    </div>

                    <div class="input-box">
                        <input type="email" placeholder="Email" name="email" required>
                    </div>

                    <div class="input-box">
                        <input type="password" placeholder="Password" name="password" required>
                    </div>
                    
                    <button class="main-button" type="submit" name="signup">Sign Up</button>

                    <p class="switch-link">
                        Already have an account?
                        <span id="show-login">Login</span>
                    </p>
                </form>
            </div>

        </div>
    </div>

    <script>

     document.addEventListener('DOMContentLoaded', () => {
            const card = document.getElementById('card');
            const showSignup = document.getElementById('show-signup');
            const showLogin = document.getElementById('show-login');

            showSignup.addEventListener('click', () => {
                card.classList.add('is-flipped');
            });

            showLogin.addEventListener('click', () => {
                card.classList.remove('is-flipped');
            });

            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', async function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const data = Object.fromEntries(formData.entries());

                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();
                    if (response.ok) {
                        localStorage.setItem('authToken', result.token);
                        alert("मस्त! लॉगिन हो गया।");
                        window.location.href = '/index.html'; 
                    } else {
                        alert("Error: " + result.message);
                    }
                } catch (error) {
                    console.error("Login Error:", error);
                }
            });

            const signupForm = document.getElementById('signupForm');
            signupForm.addEventListener('submit', async function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const data = Object.fromEntries(formData.entries());

                try {
                    const response = await fetch('/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();
                    if (response.ok) {
                        alert("Account has been created. Please login ");
                        card.classList.remove('is-flipped'); 
                    } else {
                        alert("Signup Failed: " + result.message);
                    }
                } catch (error) {
                    console.error("Signup Error:", error);
                    alert("server not connected ");
                }
            });
        });      

    </script>
   
</body>
</html>
